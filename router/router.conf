# Optional but recommended
worker_processes auto;

# Allow Nginx to read these environment variables at runtime
env FRONTEND_URL;
env BACKEND_URL;

events {
    worker_connections 1024;
}

http {
    # (Optional) common defaults
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 8080;
        listen [::]:8080;
        server_name localhost;
        
        # Route frontend (no change)
        location / {
            proxy_pass http://$FRONTEND_URL/;  # React deployed link
        }

        # Route backend API (minimal change + header forwarding)
        location /api/ {
            # keep your existing rewrite logic
            rewrite ^/api/(.*)$ /$1 break;

            # forward the SPCS caller token header unchanged
            proxy_pass_request_headers on;
            proxy_set_header sf-context-current-user-token $http_sf_context_current_user_token;

            # preserve standard headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # optional timeouts (< 90s SPCS ingress idle)
            proxy_read_timeout 75s;
            proxy_send_timeout 75s;

            proxy_pass http://$BACKEND_URL/;
        }
    }
}
               