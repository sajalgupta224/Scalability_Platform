<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="50%" stop-color="#0A1B3A"/>
      <stop offset="100%" stop-color="#12102D"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2DD4FF" stop-opacity="0.18"/>
      <stop offset="65%" stop-color="#2DD4FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#2DD4FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="blueNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D9BF0"/>
      <stop offset="100%" stop-color="#0B4C8C"/>
    </linearGradient>

    <linearGradient id="orangeNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB020"/>
      <stop offset="100%" stop-color="#FF6A00"/>
    </linearGradient>

    <style>
      .title { font: 700 64px system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #FFFFFF; letter-spacing: 1px; }
      .subtitle { font: 400 26px system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: rgba(255,255,255,0.75); }
      .line { stroke: rgba(80, 220, 255, 0.8); stroke-width: 8; stroke-linecap: round; }
      .grid { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g opacity="1">
    <path class="grid" d="M0 540 H1200"/>
    <path class="grid" d="M0 470 H1200"/>
    <path class="grid" d="M0 400 H1200"/>
    <path class="grid" d="M0 330 H1200"/>
    <path class="grid" d="M0 260 H1200"/>
    <path class="grid" d="M160 0 V675"/>
    <path class="grid" d="M320 0 V675"/>
    <path class="grid" d="M480 0 V675"/>
    <path class="grid" d="M640 0 V675"/>
    <path class="grid" d="M800 0 V675"/>
    <path class="grid" d="M960 0 V675"/>
    <path class="grid" d="M1120 0 V675"/>
  </g>

  <!-- Connections -->
  <g filter="url(#nodeGlow)">
    <path class="line" d="M330 205 H520"/>
    <path class="line" d="M600 230 V330"/>
    <path class="line" d="M680 205 H870"/>
    <path class="line" d="M280 355 H470"/>
    <path class="line" d="M730 355 H920"/>
    <path class="line" d="M520 355 H680"/>
  </g>

  <!-- Central database -->
  <g filter="url(#softShadow)">
    <rect x="520" y="150" width="160" height="160" rx="22" fill="#0E2F56" stroke="rgba(45,212,255,0.65)" stroke-width="3"/>
    <ellipse cx="600" cy="195" rx="54" ry="18" fill="#BFEAFF" opacity="0.95"/>
    <rect x="546" y="195" width="108" height="62" fill="#BFEAFF" opacity="0.85"/>
    <ellipse cx="600" cy="257" rx="54" ry="18" fill="#BFEAFF" opacity="0.95"/>
    <ellipse cx="600" cy="225" rx="54" ry="18" fill="#BFEAFF" opacity="0.25"/>
  </g>

  <!-- Blue nodes -->
  <g filter="url(#softShadow)">
    <rect x="240" y="260" width="190" height="130" rx="22" fill="url(#blueNode)" opacity="0.95"/>
    <rect x="505" y="330" width="190" height="130" rx="22" fill="url(#blueNode)" opacity="0.95"/>
  </g>

  <!-- Orange nodes -->
  <g filter="url(#softShadow)">
    <rect x="245" y="150" width="110" height="110" rx="18" fill="url(#orangeNode)"/>
    <rect x="845" y="150" width="110" height="110" rx="18" fill="url(#orangeNode)"/>
    <rect x="220" y="330" width="110" height="110" rx="18" fill="url(#orangeNode)"/>
    <rect x="875" y="330" width="110" height="110" rx="18" fill="url(#orangeNode)"/>
  </g>

  <!-- Text -->
  <text x="600" y="560" text-anchor="middle" class="title">LINEAGE GRAPH</text>
  <text x="600" y="605" text-anchor="middle" class="subtitle">Visualize lineage and dependencies</text>
</svg>
